<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação Javascript</title>
</head>
<body>
    <h1>Lógica de programação Javascript</h1>
    <script>
        var n = parseInt(prompt("Digite um número: "))

        switch (n){
            case 1:
                alert ("Parabéns")
                break
            case 2:
                alert ("Legal")
                break
            case 3:
                alert ("Caramba")
            default:
                alert ("Escolha um número de 1 a 3")
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação javascript</title>
</head>
<body>
    <h1>Lógica de programação javascript</h1>
    <script>
        var n1 = parseInt(prompt("Digite um número"));

        switch(n1) {
            case 1:;
                alert ("Muito bom");
                break;
            case 2:;
                alert ("Bacana");
                break;
            case 3:;
                alert ("Normal");
                break;
            default:;  
                alert ("Escolha de 1 a 3");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação javascript</title>
</head>
<body>
    <h1>Lógica de programação javascript</h1>
    <script>
        var numero = parseInt(prompt('Digite o número para a tabuada'));
        var indice = 1

        while (indice <=500) {
            document.write (indice + 'X' + 1 + '=' + indice * 1 + '<br>')

            indice = indice + 1
        }
        document.write ('Fim da tabuada')
    </script>
</body>
</html>

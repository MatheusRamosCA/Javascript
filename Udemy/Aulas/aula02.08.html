<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação Javascript</title>
</head>
<body>
    <h1>Lógica de programação Javascript</h1>
    <script>
        var nome = prompt ("Digite seu nome: ")
        var comp = nome.length

        switch (comp) {
            case 5:
                alert ("Nome pequeno")
                break
            case 7:
                alert ("Nome grande")
            default:
                alert ("Não entendi")
        }
    </script>
</body>
</html>

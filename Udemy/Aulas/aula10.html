<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">

    <title>Lógica de programação javascript</title>
</head>
<body>
    <h1>Lógica de programação javascript</h1>
    <script>
        var numero = parseInt(prompt('Digite o número para a tabuada'));

        for (var i=1; i <= 500; i++){
            document.write (i + 'X' + 1 + '=' + i * 1 + '<br>')
        }
        document.write ('Fim da tabuada')
    </script>

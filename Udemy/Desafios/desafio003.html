<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 003</title>
</head>
<body>
    <h1>Desafio 003</h1>
    <script>
        var n1 = parseFloat(prompt("Digite um número: "));
        var n2 = parseFloat(prompt("Digite outro número: "));

        if (n1==n2) {
            alert ("Empate")
        } else {
            var sorteio = parseInt(Math.random() * 2);
        }
        if (sorteio === 0) {
            if (n1 < n2) {
                alert ("O jogador 1 ganhou")
            } else {
                alert ("O jogador 2 ganhou")
            }
        } else {
            if (n1 > n2) {
                alert ("O jogador 1 ganhou")
            }   else {
                alert ("O jogador 2 ganhou")
            }
        }
    </script>
</body>
</html>

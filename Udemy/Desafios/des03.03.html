<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação Javascript</title>
</head>
<body>
    <h1>Lógica de programação Javascript</h1>
    <script>

        var num = 1004;

        while (num <= 2017) {
            if (!(num % 100 === 0) || (num % 400 === 0 )){
                document.write (num + '<br>')
            } else {
                document.write (num + ' Esse ano não é bissexto' + '<br>')
            }
            // num = num + 4
            num += 4;
        }
        document.write ("Fim do loop")
    </script>
</body>
</html>

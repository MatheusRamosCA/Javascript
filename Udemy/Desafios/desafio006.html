<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 006</title>
</head>
<body>
    <h1>Desafio 006</h1>
    <script>
        var n = parseInt(prompt("Digite um número para a tabuada:"));
        var indice = 0

        while (indice <= 500) {
            document.write(n + ' X ' + indice + '=' + n*indice + '<br>');

            if (indice % 10 === 0 && indice > 0) {
                document.write('<hr>');
            }

            indice = indice + 1
        }
    </script>
</body>
</html>

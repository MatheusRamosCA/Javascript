<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação Javascript</title>
</head>
<body>
    <h1>Lógica de programação Javascript</h1>
    <script>
        var n1 = prompt ("Digite um número");
        n1 = parseInt (n1);
        var n2 = prompt ("Digite um número");
        n2 = parseInt (n2);

        mod = n1%n2
        alert ("O resto da divisão de "+ n1 + " por " + n2 + " é " + mod)
        expo = n1**n2
        alert ("O número "+ n1 + " elevado a " + n2 + " é " + expo)
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação javascript</title>
</head>
<body>
    <h1>Lógica de programação javascript</h1>
    <script>
        //Pedir para o usuário digitar um número
        var n1 = prompt("Digite o primeiro número")
        n1 = parseInt (n1);
        //Pedir para o usúario digitar outro número
        var n2 = prompt("Digite o segundo número:");
        n2 = parseInt (n2);
        //Mostrar a soma
        var soma = (n1)+(n2)
        alert ("O resultado é: " + soma)
    </script>
</body>
</html>
